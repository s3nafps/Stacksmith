services:
  stacksmith:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - stacksmith-data:/app/prisma
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  stacksmith-data:
