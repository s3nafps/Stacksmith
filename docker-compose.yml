services:
  postgres:
    image: postgres:16-alpine
    container_name: infrapack-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: infrapack
      POSTGRES_PASSWORD: infrapack_dev
      POSTGRES_DB: infrapack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infrapack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
