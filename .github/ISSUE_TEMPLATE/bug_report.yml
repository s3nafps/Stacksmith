name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation type
      options: ["local", "self-hosted", "demo", "other"]
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
  - type: input
    id: database
    attributes:
      label: Database
  - type: input
    id: os
    attributes:
      label: Operating system
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
  - type: textarea
    id: actual
    attributes:
      label: Actual result
  - type: textarea
    id: logs
    attributes:
      label: Logs with secrets removed
