name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./test.db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-at-least-32-characters
      ENCRYPTION_KEY: ci-encryption-secret-at-least-32-characters
      TOKEN_ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
      GITHUB_CLIENT_ID: ci-github-client-id
      GITHUB_CLIENT_SECRET: ci-github-client-secret
      ENABLE_DEMO_AUTH: "true"
      ENABLE_RUNNER_SIMULATOR: "true"
      MOCK_GITHUB_API: "true"
      NEXT_PUBLIC_MOCK_GITHUB_API: "true"
      ENABLE_MOCK_BILLING: "false"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Prepare test database
        run: npx prisma db push --accept-data-loss

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build application
        env:
          ENABLE_DEMO_AUTH: "false"
          NEXT_PUBLIC_ENABLE_DEMO_AUTH: "false"
          ENABLE_RUNNER_SIMULATOR: "false"
          MOCK_GITHUB_API: "false"
          NEXT_PUBLIC_MOCK_GITHUB_API: "false"
        run: npm run build
